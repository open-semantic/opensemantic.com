name: Validate semantic model

on:
  push:
    branches: ["main"]
    paths:
      - 'public/semantic_model.yaml'
  pull_request:
    paths:
      - 'public/semantic_model.yaml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install check-jsonschema
        run: pip install check-jsonschema
      - name: Validate semantic_model.yaml against OSI JSON Schema
        run: >
          check-jsonschema
          --schemafile https://raw.githubusercontent.com/open-semantic-interchange/OSI/refs/heads/main/core-spec/osi-schema.json
          public/semantic_model.yaml
