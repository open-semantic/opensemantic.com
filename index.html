    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a semantic model?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A semantic model is a structured representation of data that defines business meaning, relationships, and metrics on top of raw data. It bridges the gap between technical data storage and business understanding, enabling consistent analytics across different tools and platforms."
          }
        },
        {
          "@type": "Question",
          "name": "What is Open Semantic Interchange (OSI)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Open Semantic Interchange (OSI) is an industry-driven initiative to create a common, vendor-agnostic semantic model specification. It ensures data definitions and business semantics remain consistent as they are interchanged between AI agents, BI platforms, and analytics tools."
          }
        },
        {
          "@type": "Question",
          "name": "Why do semantic models matter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Semantic models matter because they provide a single source of truth for business data definitions. Without them, different tools may interpret the same data differently, leading to inconsistent metrics, duplicated logic, and broken analytics when switching platforms."
          }
        },
        {
          "@type": "Question",
          "name": "What platforms does OSI support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "OSI supports multi-dialect expressions across ANSI SQL, Snowflake, Databricks, Tableau, and MDX. It also supports vendor-specific extensions for Snowflake, Salesforce, dbt, Databricks, and more through its custom extensions mechanism."
          }
        },
        {
          "@type": "Question",
          "name": "How does OSI differ from vendor-specific semantic layers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Unlike vendor-specific semantic layers (such as Snowflake's semantic model or Tableau's data model), OSI provides a vendor-agnostic specification that can be translated to and from any platform. This prevents lock-in and enables true interoperability between tools."
          }
        },
        {
          "@type": "Question",
          "name": "What does an OSI semantic model include?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An OSI semantic model includes: datasets (logical fact and dimension tables with typed fields), relationships (foreign key connections between datasets), metrics (aggregate business measures like revenue and order count), AI context (instructions and synonyms for AI agents), and custom extensions for vendor-specific metadata."
          }
        }
      ]
    }
    </script>
